# Only fields that differ from default.yaml are listed here.
# Merged at runtime by load_game_config().
game_id: r6
display_name: "Rainbow Six Siege"
moment:
  pre_buffer_sec: 5.0
  post_buffer_sec: 4.0
  min_gap_sec: 2.0
  max_clip_duration_sec: 20.0
# R6 has louder, more distinct audio cues (gunshots, breaches, explosions).
# A slightly lower threshold catches more events reliably.
audio:
  spike_threshold_sigma: 1.8
  min_peak_distance_sec: 1.2
  max_signals_per_minute: 25
  weight: 0.55
visual:
  sample_every_n_frames: 2
  threshold_sigma: 2.2
  weight: 0.45
composite:
  cluster_window_sec: 2.5
  min_moment_score: 0.25
  max_moments_per_video: 20
